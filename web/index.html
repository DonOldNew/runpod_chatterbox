<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Advance HR — Llamada con Carolina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #4ecdc4;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 40px;
        }
        .call-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .call-btn.idle {
            background: #4ecdc4;
            color: white;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
        }
        .call-btn.idle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(78, 205, 196, 0.5);
        }
        .call-btn.active {
            background: #e74c3c;
            color: white;
            animation: pulse 1.5s infinite;
        }
        .call-btn.connecting {
            background: #f39c12;
            color: white;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(231, 76, 60, 0.3); }
            50% { box-shadow: 0 0 50px rgba(231, 76, 60, 0.6); }
        }
        .status {
            font-size: 16px;
            margin-bottom: 20px;
            min-height: 24px;
        }
        .status.connected { color: #4ecdc4; }
        .status.connecting { color: #f39c12; }
        .status.error { color: #e74c3c; }
        .transcript {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .transcript .user { color: #74b9ff; }
        .transcript .assistant { color: #4ecdc4; }
        .transcript .system { color: #636e72; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📞</div>
        <h1>Carolina Martinez</h1>
        <div class="subtitle">Recursos Humanos — Global Advance</div>

        <button id="callBtn" class="call-btn idle" onclick="toggleCall()">📞</button>

        <div id="status" class="status">Toca para llamar</div>

        <div id="transcript" class="transcript">
            <div class="system">Listo para conectar...</div>
        </div>
    </div>

    <script>
        let pc = null;
        let isConnected = false;

        const btn = document.getElementById('callBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = role;
            div.textContent = (role === 'user' ? 'Tu: ' : role === 'assistant' ? 'Carolina: ' : '') + text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        async function toggleCall() {
            if (isConnected) {
                endCall();
            } else {
                startCall();
            }
        }

        async function startCall() {
            btn.className = 'call-btn connecting';
            btn.textContent = '⏳';
            status.textContent = 'Conectando...';
            status.className = 'status connecting';
            addMessage('system', 'Conectando con Carolina...');

            try {
                pc = new RTCPeerConnection();

                // Get microphone
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                    }
                });

                stream.getTracks().forEach(track => pc.addTrack(track, stream));

                // Handle incoming audio
                pc.ontrack = (event) => {
                    const audio = new Audio();
                    audio.srcObject = event.streams[0];
                    audio.play();
                };

                // Create offer
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering
                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        };
                        setTimeout(resolve, 3000); // Timeout after 3s
                    }
                });

                // Send to server
                const resp = await fetch('/offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type,
                    }),
                });

                const answer = await resp.json();
                await pc.setRemoteDescription(new RTCSessionDescription(answer));

                isConnected = true;
                btn.className = 'call-btn active';
                btn.textContent = '📵';
                status.textContent = 'En llamada con Carolina';
                status.className = 'status connected';
                addMessage('system', 'Conectada. Habla ahora...');

            } catch (err) {
                console.error('Call failed:', err);
                status.textContent = 'Error: ' + err.message;
                status.className = 'status error';
                addMessage('system', 'Error al conectar: ' + err.message);
                btn.className = 'call-btn idle';
                btn.textContent = '📞';
            }
        }

        function endCall() {
            if (pc) {
                pc.close();
                pc = null;
            }
            isConnected = false;
            btn.className = 'call-btn idle';
            btn.textContent = '📞';
            status.textContent = 'Llamada terminada';
            status.className = 'status';
            addMessage('system', 'Llamada finalizada.');
        }
    </script>
</body>
</html>
